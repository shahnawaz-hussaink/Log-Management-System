<div class="min-h-screen flex flex-col md:flex-row bg-[var(--background)] font-sans">
  
  <!-- Left Side: MoE Banner & Portal Branding (Hidden on mobile) -->
  <div class="hidden md:flex md:w-[50%] lg:w-[55%] bg-blue-700 text-white flex-col justify-between p-10 relative flex-shrink-0">
    
    <!-- Top White Branding Banner Image -->
    <div class="w-full max-w-lg mx-auto relative z-10 transition-all">
      <img src="samarthx_banner.png" alt="Branding Banner" class="w-full h-auto object-contain rounded-xl shadow-xs">
    </div>

    <!-- Middle Portal Heading -->
    <div class="my-auto text-center relative z-10">
      <h1 class="text-3xl lg:text-4xl font-extrabold tracking-wider uppercase text-white drop-shadow-md">
        Document Management Portal
      </h1>
      <p class="text-blue-100 text-sm mt-3 max-w-md mx-auto font-medium opacity-90 leading-relaxed">
        A secure and centralized repository for school documents, academic records, logs, and workflow approval management.
      </p>
    </div>

    <!-- Spacing div at bottom -->
    <div class="h-10"></div>
  </div>

  <!-- Right Side: Register Form -->
  <div class="flex-1 flex flex-col justify-center items-center p-6 sm:p-12 md:p-16 bg-[var(--surface)] relative overflow-y-auto custom-scrollbar">
    <div class="w-full max-w-[420px] space-y-6 my-8">
      
      <!-- Brand Logo Header -->
      <div class="text-center">
        <img src="samarthx_white.png" alt="SamarthX Logo" class="h-16 w-auto object-contain mx-auto mb-2">
        <p class="text-xs text-[var(--text-secondary)] font-semibold uppercase tracking-wider">Create a Document Management Portal account</p>
      </div>

      <!-- Main Sign Up Form -->
      <form (submit)="register()" class="space-y-4">
        
        <!-- Name Input -->
        <div class="space-y-1">
          <label for="reg-name" class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input id="reg-name" 
                   type="text" 
                   class="block w-full pl-10 pr-3 py-2 text-xs bg-[var(--background)] border border-[var(--border)] rounded-xl focus:outline-none focus:bg-[var(--surface)] focus:ring-4 focus:ring-[var(--primary)]/10 focus:border-[var(--primary)] text-[var(--text-primary)] placeholder-slate-400 dark:placeholder-slate-500" 
                   [(ngModel)]="name" 
                   name="name" 
                   placeholder="Enter your full name" 
                   required>
          </div>
        </div>

        <!-- Email Input -->
        <div class="space-y-1">
          <label for="reg-email" class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input id="reg-email" 
                   type="email" 
                   class="block w-full pl-10 pr-3 py-2 text-xs bg-[var(--background)] border border-[var(--border)] rounded-xl focus:outline-none focus:bg-[var(--surface)] focus:ring-4 focus:ring-[var(--primary)]/10 focus:border-[var(--primary)] text-[var(--text-primary)] placeholder-slate-400 dark:placeholder-slate-500" 
                   [(ngModel)]="email" 
                   name="email" 
                   placeholder="e.g. name@school.edu" 
                   required>
          </div>
        </div>

        <!-- Password Input -->
        <div class="space-y-1">
          <label for="reg-password" class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider">Password (Min 8 characters)</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input id="reg-password" 
                   type="password" 
                   class="block w-full pl-10 pr-3 py-2 text-xs bg-[var(--background)] border border-[var(--border)] rounded-xl focus:outline-none focus:bg-[var(--surface)] focus:ring-4 focus:ring-[var(--primary)]/10 focus:border-[var(--primary)] text-[var(--text-primary)] placeholder-slate-400 dark:placeholder-slate-500" 
                   [(ngModel)]="password" 
                   name="password" 
                   placeholder="••••••••" 
                   required>
          </div>
        </div>

        <!-- Confirm Password Input -->
        <div class="space-y-1">
          <label for="reg-confirm-password" class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider">Confirm Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
              </svg>
            </div>
            <input id="reg-confirm-password" 
                   type="password" 
                   class="block w-full pl-10 pr-3 py-2 text-xs bg-[var(--background)] border border-[var(--border)] rounded-xl focus:outline-none focus:bg-[var(--surface)] focus:ring-4 focus:ring-[var(--primary)]/10 focus:border-[var(--primary)] text-[var(--text-primary)] placeholder-slate-400 dark:placeholder-slate-500" 
                   [(ngModel)]="confirmPassword" 
                   name="confirmPassword" 
                   placeholder="••••••••" 
                   required>
          </div>
        </div>
        
        <!-- Error Alerts -->
        <div *ngIf="error" class="text-rose-600 text-xs p-3 bg-rose-50 dark:bg-rose-950/40 border border-rose-100 dark:border-rose-900/30 rounded-xl">
          {{ error }}
        </div>
        
        <!-- Submit Button -->
        <button type="submit" 
                class="w-full app-btn-primary py-2.5 cursor-pointer shadow-sm hover:shadow-md active:scale-98 transition-all rounded-xl text-xs font-semibold mt-2" 
                [disabled]="loading">
          <span *ngIf="!loading">Create Account</span>
          <span *ngIf="loading">Creating Account...</span>
        </button>
      </form>
      
      <!-- Footer login link -->
      <p class="text-center text-xs text-[var(--text-secondary)] pt-2">
        Already have a portal account? 
        <a routerLink="/login" class="text-[var(--primary)] hover:underline font-bold">Sign in here</a>
      </p>

    </div>
  </div>

</div>

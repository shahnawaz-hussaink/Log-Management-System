<div class="container mt-4" style="max-width: 600px;">
  <div class="card">
    <h2 style="margin-bottom: 2rem;">Upload Document</h2>
    
    <div class="form-group">
      <label class="form-label">Select File (PDF, DOCX)</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)" accept=".pdf,.docx">
    </div>

    <div class="form-group">
      <label class="form-label">Select Initial Approver</label>
      <select class="form-control" [(ngModel)]="targetOwnerId">
        <option *ngFor="let user of users" [value]="user.ID">{{ user.Name }} ({{ user.Email }})</option>
      </select>
    </div>

    <div *ngIf="error" style="color: var(--danger-color); margin-bottom: 1rem; font-size: 0.9rem;">
      {{ error }}
    </div>

    <div class="flex gap-4 mt-4">
      <button class="btn btn-primary" (click)="upload()">Upload & Submit</button>
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
    </div>
  </div>
</div>
